<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rockbusters · Draft Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0d0d0d;
      border-bottom: 1px solid #222;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
    }

    .header h1 span { color: #f0f0f0; }

    .stats {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: #555;
    }

    .stats strong { color: #f0f0f0; }

    /* ── Layout ── */
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 24px;
      padding: 32px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
    }

    .card.approved { border-color: #2a5c2a; }
    .card.rejected { border-color: #5c2a2a; opacity: 0.6; }
    .card.needs_revision { border-color: #5c4a1a; }

    /* ── Card header ── */
    .card-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.3;
    }

    .card-meta {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.carousel { background: #1a2a4a; color: #6699ff; }
    .badge.quote_card { background: #2a1a4a; color: #aa88ff; }
    .badge.highlight_cover { background: #1a3a2a; color: #66cc99; }
    .badge.story_frame { background: #3a2a1a; color: #ffaa66; }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-badge.approved { color: #5cc45c; }
    .status-badge.rejected { color: #cc5c5c; }
    .status-badge.needs_revision { color: #ccaa44; }
    .status-badge.pending { color: #555; }

    /* ── Photo ── */
    .photo-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/5;
      background: #111;
      overflow: hidden;
    }

    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 20%;
      display: block;
    }

    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 13px;
    }

    /* Slide strip for carousels */
    .slide-strip {
      display: flex;
      gap: 4px;
      padding: 8px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      background: #111;
    }

    .slide-strip::-webkit-scrollbar { display: none; }

    .slide-thumb {
      flex-shrink: 0;
      width: 56px;
      height: 70px;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      background: #1a1a1a;
      position: relative;
    }

    .slide-thumb.active { border-color: #ff6b00; }

    .slide-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 20%;
    }

    .slide-num {
      position: absolute;
      bottom: 2px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    /* ── Slide overlay (carousel) ── */
    .slide-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    }

    .slide-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 4px;
    }

    .slide-headline {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      white-space: pre-line;
    }

    .slide-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ff6b00;
      margin-bottom: 4px;
    }

    .slide-body {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.85);
      margin-top: 6px;
      white-space: pre-line;
    }

    /* Quote overlay */
    .quote-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 60%, transparent 100%);
    }

    .quote-text {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.01em;
      white-space: pre-line;
      margin-bottom: 10px;
    }

    .quote-attribution {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.08em;
    }

    /* Highlight overlay */
    .highlight-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      padding: 24px;
      text-align: center;
    }

    .highlight-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .highlight-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    /* ── Caption ── */
    .caption-area {
      padding: 16px 20px;
      border-top: 1px solid #1f1f1f;
      flex: 1;
    }

    .caption-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 8px;
    }

    .caption-text {
      font-size: 12px;
      line-height: 1.65;
      color: #aaa;
      white-space: pre-wrap;
      max-height: 120px;
      overflow: hidden;
      position: relative;
    }

    .caption-text.expanded { max-height: none; }

    .caption-text::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 32px;
      background: linear-gradient(to bottom, transparent, #161616);
      pointer-events: none;
    }

    .caption-text.expanded::after { display: none; }

    .expand-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0;
      margin-top: 4px;
    }

    .expand-btn:hover { color: #999; }

    /* ── Comments ── */
    .comments-area {
      padding: 0 20px 12px;
    }

    .comment-item {
      background: #1a1a1a;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 6px;
      font-size: 12px;
      color: #999;
      border-left: 2px solid #333;
    }

    .comment-item .comment-time {
      font-size: 10px;
      color: #444;
      float: right;
    }

    /* ── Actions ── */
    .actions {
      padding: 16px 20px;
      border-top: 1px solid #1f1f1f;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      text-align: center;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-approve {
      background: #1d3d1d;
      border-color: #2d5c2d;
      color: #6fe06f;
    }

    .btn-approve:hover:not(:disabled) {
      background: #234d23;
      border-color: #4a8c4a;
    }

    .btn-approve.active {
      background: #2a5c2a;
      border-color: #5cc45c;
      color: #5cc45c;
    }

    .btn-reject {
      background: #3d1d1d;
      border-color: #5c2d2d;
      color: #e07070;
    }

    .btn-reject:hover:not(:disabled) {
      background: #4d2323;
      border-color: #8c4a4a;
    }

    .btn-reject.active {
      background: #5c2a2a;
      border-color: #cc5c5c;
      color: #cc5c5c;
    }

    .comment-row {
      display: flex;
      gap: 8px;
    }

    .comment-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 12px;
      color: #f0f0f0;
      outline: none;
      transition: border-color 0.15s;
    }

    .comment-input:focus { border-color: #444; }
    .comment-input::placeholder { color: #444; }

    .btn-comment {
      background: #1a1a2a;
      border-color: #2a2a4a;
      color: #8888cc;
      white-space: nowrap;
      padding: 8px 16px;
      flex: 0;
    }

    .btn-comment:hover:not(:disabled) {
      background: #222240;
      border-color: #4444aa;
    }

    /* ── Version badge ── */
    .version-badge {
      font-size: 10px;
      color: #333;
      font-weight: 600;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 40px;
      color: #444;
    }

    .empty h2 { font-size: 20px; margin-bottom: 12px; color: #555; }
    .empty code {
      font-size: 13px;
      background: #1a1a1a;
      padding: 4px 10px;
      border-radius: 5px;
      color: #888;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #232323;
      border: 1px solid #333;
      color: #f0f0f0;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header class="header">
  <h1>ROCKBUSTERS · <span>Draft Review</span></h1>
  <div class="stats" id="stats">Loading...</div>
</header>

<div class="board" id="board">
  <div class="empty">
    <h2>Loading drafts...</h2>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:4201';

// ── State ─────────────────────────────────────────────────────────────────────

let drafts = [];
let activeSlides = {}; // draftName → slideIndex

// ── Fetch ─────────────────────────────────────────────────────────────────────

async function loadDrafts() {
  try {
    const res = await fetch(`${API}/api/drafts`);
    drafts = await res.json();
    render();
  } catch (err) {
    document.getElementById('board').innerHTML = `
      <div class="empty">
        <h2>Server not running</h2>
        <p style="margin-top:8px;font-size:14px;color:#666;">Start it with: <code>node review-server.js</code></p>
      </div>`;
  }
}

async function postAction(draftName, action, body = {}) {
  const res = await fetch(`${API}/api/draft/${draftName}/${action}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function photoSrc(photoPath) {
  if (!photoPath) return null;
  return `${API}/${photoPath}`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function renderSlideContent(slide, index) {
  const src = photoSrc(slide.photo);
  const imgTag = src
    ? `<img src="${src}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=photo-placeholder>No photo</div>'">`
    : `<div class="photo-placeholder">No photo</div>`;

  let overlay = '';

  if (slide.type === 'cover') {
    overlay = `<div class="slide-overlay">
      ${slide.eyebrow ? `<div class="slide-eyebrow">${esc(slide.eyebrow)}</div>` : ''}
      ${slide.headline ? `<div class="slide-headline">${esc(slide.headline)}</div>` : ''}
      ${slide.subline ? `<div class="slide-body" style="margin-top:6px;font-size:12px;">${esc(slide.subline)}</div>` : ''}
    </div>`;
  } else {
    overlay = `<div class="slide-overlay">
      ${slide.label ? `<div class="slide-label">${esc(slide.label)}</div>` : ''}
      ${slide.headline ? `<div class="slide-headline" style="font-size:18px;">${esc(slide.headline)}</div>` : ''}
      ${slide.body ? `<div class="slide-body">${esc(slide.body)}</div>` : ''}
    </div>`;
  }

  return { imgTag, overlay };
}

function renderCard(draft) {
  const name = draft.name;
  const type = draft.type;
  const meta = draft._meta || {};
  const status = meta.status || 'pending';
  const comments = meta.comments || [];
  const activeSlide = activeSlides[name] || 0;

  // ── Photo area ──
  let photoArea = '';

  if (type === 'carousel' && draft.slides?.length) {
    const slide = draft.slides[activeSlide] || draft.slides[0];
    const { imgTag, overlay } = renderSlideContent(slide, activeSlide);

    const thumbs = draft.slides.map((s, i) => {
      const src = photoSrc(s.photo);
      return `<div class="slide-thumb ${i === activeSlide ? 'active' : ''}" onclick="setSlide('${name}', ${i})">
        ${src ? `<img src="${src}" loading="lazy">` : ''}
        <div class="slide-num">${i + 1}</div>
      </div>`;
    }).join('');

    photoArea = `
      <div class="photo-container">${imgTag}${overlay}</div>
      <div class="slide-strip">${thumbs}</div>`;

  } else if (type === 'quote_card') {
    const src = photoSrc(draft.photo);
    const imgTag = src
      ? `<img src="${src}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=photo-placeholder>No photo</div>'">`
      : `<div class="photo-placeholder">No photo</div>`;
    photoArea = `<div class="photo-container">${imgTag}
      <div class="quote-overlay">
        ${draft.quote ? `<div class="quote-text">${esc(draft.quote)}</div>` : ''}
        ${draft.attribution ? `<div class="quote-attribution">— ${esc(draft.attribution)}${draft.context ? ' · ' + esc(draft.context) : ''}</div>` : ''}
      </div>
    </div>`;

  } else if (type === 'highlight_cover') {
    const src = photoSrc(draft.photo);
    const imgTag = src
      ? `<img src="${src}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=photo-placeholder>No photo</div>'">`
      : `<div class="photo-placeholder">No photo</div>`;
    photoArea = `<div class="photo-container">${imgTag}
      <div class="highlight-overlay">
        ${draft.title ? `<div class="highlight-title">${esc(draft.title)}</div>` : ''}
        ${draft.subtitle ? `<div class="highlight-subtitle">${esc(draft.subtitle)}</div>` : ''}
      </div>
    </div>`;

  } else if (type === 'story_frame') {
    const src = photoSrc(draft.photo);
    const imgTag = src
      ? `<img src="${src}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=photo-placeholder>No photo</div>'">`
      : `<div class="photo-placeholder">No photo</div>`;
    const slide = { type: 'cover', eyebrow: draft.eyebrow, headline: draft.headline };
    const { overlay } = renderSlideContent(slide, 0);
    photoArea = `<div class="photo-container">${imgTag}${overlay}</div>`;
  }

  // ── Caption ──
  const captionHtml = draft.caption
    ? `<div class="caption-area">
        <div class="caption-label">Caption</div>
        <div class="caption-text" id="cap-${name}">${esc(draft.caption)}</div>
        <button class="expand-btn" onclick="toggleCaption('${name}')">Show more</button>
      </div>`
    : '';

  // ── Comments ──
  const commentsHtml = comments.length
    ? `<div class="comments-area">
        ${comments.map(c => `
          <div class="comment-item">
            <span class="comment-time">${timeAgo(c.at)}</span>
            ${esc(c.text)}
          </div>`).join('')}
      </div>`
    : '';

  // ── Actions ──
  const isApproved = status === 'approved';
  const isRejected = status === 'rejected';

  const actionsHtml = `
    <div class="actions">
      <div class="action-row">
        <button class="btn btn-approve ${isApproved ? 'active' : ''}"
          onclick="approve('${name}')"
          ${isApproved ? 'disabled' : ''}>
          ${isApproved ? '✓ Approved' : 'Approve'}
        </button>
        <button class="btn btn-reject ${isRejected ? 'active' : ''}"
          onclick="reject('${name}')"
          ${isRejected ? 'disabled' : ''}>
          ${isRejected ? '✕ Rejected' : 'Reject'}
        </button>
      </div>
      <div class="comment-row">
        <input class="comment-input" id="comment-${name}" placeholder="Request a change... (e.g. make the tone less formal, use a different photo)"
          onkeydown="if(event.key==='Enter')sendComment('${name}')">
        <button class="btn btn-comment" onclick="sendComment('${name}')">Send</button>
      </div>
    </div>`;

  return `
    <div class="card ${status}" id="card-${name}">
      <div class="card-header">
        <div>
          <div class="card-name">${esc(name.replace(/_/g, ' '))}</div>
          <div class="card-meta">v${meta.version || 1} · ${timeAgo(meta.generated_at)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
          <span class="badge ${type}">${type.replace(/_/g, ' ')}</span>
          <span class="status-badge ${status}">${status.replace(/_/g, ' ')}</span>
        </div>
      </div>
      ${photoArea}
      ${captionHtml}
      ${commentsHtml}
      ${actionsHtml}
    </div>`;
}

function render() {
  const board = document.getElementById('board');
  const stats = document.getElementById('stats');

  if (!drafts.length) {
    board.innerHTML = `<div class="empty">
      <h2>No drafts yet</h2>
      <p style="margin-top:8px;font-size:14px;color:#555;">Run the content manager to generate some:</p>
      <p style="margin-top:8px;"><code>node content-manager.js</code></p>
    </div>`;
    stats.textContent = '0 drafts';
    return;
  }

  const pending = drafts.filter(d => (d._meta?.status || 'pending') === 'pending').length;
  const approved = drafts.filter(d => d._meta?.status === 'approved').length;
  const rejected = drafts.filter(d => d._meta?.status === 'rejected').length;

  stats.innerHTML = `
    <span><strong>${drafts.length}</strong> total</span>
    <span><strong style="color:#6fe06f">${approved}</strong> approved</span>
    <span><strong style="color:#ccaa44">${pending}</strong> pending</span>
    ${rejected ? `<span><strong style="color:#cc5c5c">${rejected}</strong> rejected</span>` : ''}`;

  board.innerHTML = drafts.map(renderCard).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function toast(msg, color = '#f0f0f0') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function setSlide(name, idx) {
  activeSlides[name] = idx;
  const card = document.getElementById(`card-${name}`);
  const draft = drafts.find(d => d.name === name);
  if (card && draft) {
    // Re-render just this card
    const div = document.createElement('div');
    div.innerHTML = renderCard(draft);
    card.replaceWith(div.firstElementChild);
  }
}

function toggleCaption(name) {
  const el = document.getElementById(`cap-${name}`);
  if (!el) return;
  const expanded = el.classList.toggle('expanded');
  el.nextElementSibling.textContent = expanded ? 'Show less' : 'Show more';
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function approve(name) {
  await postAction(name, 'approve');
  const draft = drafts.find(d => d.name === name);
  if (draft) { draft._meta = draft._meta || {}; draft._meta.status = 'approved'; }
  render();
  toast('✓ Approved', '#6fe06f');
}

async function reject(name) {
  await postAction(name, 'reject');
  const draft = drafts.find(d => d.name === name);
  if (draft) { draft._meta = draft._meta || {}; draft._meta.status = 'rejected'; }
  render();
  toast('Rejected', '#cc5c5c');
}

async function sendComment(name) {
  const input = document.getElementById(`comment-${name}`);
  const comment = input?.value?.trim();
  if (!comment) return;

  await postAction(name, 'comment', { comment });
  input.value = '';

  const draft = drafts.find(d => d.name === name);
  if (draft) {
    draft._meta = draft._meta || {};
    draft._meta.status = 'needs_revision';
    draft._meta.comments = draft._meta.comments || [];
    draft._meta.comments.push({ text: comment, at: new Date().toISOString() });
  }
  render();
  toast('Comment saved — regenerate to apply', '#8888cc');
}

// ── Init ──────────────────────────────────────────────────────────────────────

loadDrafts();

// Auto-refresh every 15s to pick up new drafts
setInterval(loadDrafts, 15000);
</script>
</body>
</html>
