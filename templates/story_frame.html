<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #111;
  }

  .photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.3) 0%,
      rgba(0,0,0,0.1) 40%,
      rgba(0,0,0,0.6) 75%,
      rgba(0,0,0,0.88) 100%
    );
  }

  /* text-only variant (no photo) */
  body.text-only {
    background: #151515;
  }
  body.text-only .photo { display: none; }
  body.text-only .overlay { background: none; }

  .top-bar {
    position: absolute;
    top: 72px;
    left: 72px;
    right: 72px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    opacity: 0.7;
  }

  .brand-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 80px 80px 120px;
  }

  /* centred variant */
  body.centred .content {
    bottom: auto;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
    padding: 0 100px;
  }

  .eyebrow {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.24em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .headline {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -0.025em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .body-text {
    font-size: 34px;
    font-weight: 400;
    color: rgba(255,255,255,0.82);
    line-height: 1.6;
  }

  .body-text strong {
    color: #fff;
    font-weight: 700;
  }

  .cta {
    margin-top: 48px;
    display: inline-block;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.16em;
    color: #fff;
    text-transform: uppercase;
    padding: 20px 48px;
    border: 2px solid rgba(255,255,255,0.7);
  }

  .divider {
    width: 48px;
    height: 3px;
    background: rgba(255,255,255,0.6);
    margin-bottom: 28px;
  }
</style>
</head>
<body class="{{body_class}}">

  <img class="photo" src="{{photo_path}}" />
  <div class="overlay"></div>

  <div class="top-bar">
    <div class="brand-dot"></div>
    <div class="brand-name">Rockbusters</div>
  </div>

  {{content_block}}

</body>
</html>
