<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="{{brand_dir}}/styles.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1920px; overflow:hidden; position:relative; background:var(--rb-black);
         font-family:var(--font-body); }
  .photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; }
  .shade { position:absolute; inset:0; background:linear-gradient(to bottom,
            rgba(0,0,0,.55) 0%, rgba(0,0,0,.2) 35%, rgba(0,0,0,.45) 70%, rgba(0,0,0,.8) 100%); }
  .tex { position:absolute; inset:0; background:url("{{brand_dir}}/assets/pattern-white.png"); background-size:cover;
         opacity:.14; mix-blend-mode:screen; pointer-events:none; }
  .badge { position:absolute; top:96px; left:50%; transform:translateX(-50%); height:96px; z-index:5; }
  .center { position:absolute; left:60px; right:60px; top:50%; transform:translateY(-50%); text-align:center; z-index:4; }
  .title { font-family:var(--font-display); font-weight:var(--fw-black); text-transform:uppercase;
           font-size:128px; line-height:var(--lh-tight); letter-spacing:var(--ls-display); color:var(--rb-white);
           text-shadow:0 4px 26px rgba(0,0,0,.55); }
  .rule { width:90px; height:9px; background:var(--rb-red); border-radius:var(--radius-sm); margin:30px auto; }
  .subtitle { font-family:var(--font-display); font-weight:var(--fw-bold); text-transform:uppercase;
              letter-spacing:.1em; font-size:30px; color:var(--rb-white); }
  .wordmark { position:absolute; bottom:120px; left:0; right:0; text-align:center; font-family:var(--font-display);
              font-weight:var(--fw-black); text-transform:uppercase; font-size:30px; letter-spacing:.04em;
              color:var(--rb-white); opacity:.85; z-index:4; }
</style></head>
<body>
  <img class="photo" src="{{photo_path}}" />
  <div class="shade"></div>
  <div class="tex"></div>
  <img class="badge" src="{{brand_dir}}/assets/logo-03.png" alt="" />
  <div class="center">
    <div class="title">{{title}}</div>
    <div class="rule"></div>
    <div class="subtitle">{{subtitle}}</div>
  </div>
  <div class="wordmark">Rockbusters</div>
</body></html>
