<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #1a1a1a;
  }

  .photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* gradient overlay - stronger at bottom */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.0) 30%,
      rgba(0,0,0,0.5) 65%,
      rgba(0,0,0,0.82) 100%
    );
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 56px 64px;
  }

  /* COVER slide variant */
  .slide-cover .content {
    bottom: auto;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
    padding: 0 80px;
  }
  .slide-cover .overlay {
    background: rgba(0,0,0,0.38);
  }

  .slide-number {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: block;
  }

  .headline {
    font-size: 68px;
    font-weight: 800;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .body-text {
    font-size: 32px;
    font-weight: 400;
    color: rgba(255,255,255,0.88);
    line-height: 1.55;
    letter-spacing: 0.01em;
  }

  .body-text strong {
    color: #fff;
    font-weight: 600;
  }

  /* COVER specific */
  .cover-eyebrow {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .cover-headline {
    font-size: 86px;
    font-weight: 900;
    color: #fff;
    line-height: 1.0;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .cover-subline {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* branding strip */
  .brand {
    position: absolute;
    top: 48px;
    left: 64px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.9);
    text-transform: uppercase;
  }

  /* slide counter top-right */
  .counter {
    position: absolute;
    top: 48px;
    right: 64px;
    font-size: 17px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
  }

  /* divider line */
  .divider {
    width: 48px;
    height: 3px;
    background: #fff;
    margin-bottom: 28px;
    opacity: 0.7;
  }
</style>
</head>
<body class="{{slide_class}}">

  <img class="photo" src="{{photo_path}}" />
  <div class="overlay"></div>
  <div class="brand">Rockbusters</div>
  <div class="counter">{{slide_num}} / {{total_slides}}</div>

  {{content_block}}

</body>
</html>
