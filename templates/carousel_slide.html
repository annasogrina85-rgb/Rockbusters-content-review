<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="{{brand_dir}}/styles.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; overflow:hidden; position:relative; background:var(--rb-black);
         font-family:var(--font-body); }
  .photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; }
  .shade { position:absolute; inset:0; background:linear-gradient(to bottom,
            rgba(0,0,0,.45) 0%, rgba(0,0,0,.05) 28%, rgba(0,0,0,.45) 60%, rgba(0,0,0,.88) 100%); }
  .slide-cover .shade { background:rgba(0,0,0,.46); }
  .tex { position:absolute; inset:0; background:url("{{brand_dir}}/assets/pattern-white.png"); background-size:cover;
         opacity:.14; mix-blend-mode:screen; pointer-events:none; }
  /* brand badge + wordmark, top-left */
  .brand { position:absolute; top:48px; left:56px; display:flex; align-items:center; gap:14px; z-index:5; }
  .brand img { height:60px; }
  .brand .wordmark { font-family:var(--font-display); font-weight:var(--fw-black); font-size:28px;
                     text-transform:uppercase; color:var(--rb-white); letter-spacing:.01em; }
  /* counter pill, top-right */
  .counter { position:absolute; top:54px; right:56px; z-index:5; font-family:var(--font-display);
             font-weight:var(--fw-extrabold); font-size:17px; letter-spacing:.06em; color:var(--rb-white);
             background:var(--rb-red); padding:7px 16px; border-radius:var(--radius-pill); }
  /* content */
  .content { position:absolute; left:56px; right:56px; bottom:64px; z-index:4; }
  .slide-cover .content { bottom:auto; top:50%; transform:translateY(-50%); text-align:center; }
  .slide-number, .cover-eyebrow {
    display:inline-flex; align-items:center; font-family:var(--font-display); font-weight:var(--fw-extrabold);
    text-transform:uppercase; letter-spacing:.1em; font-size:16px; color:var(--rb-white);
    background:var(--rb-red); padding:8px 15px; border-radius:var(--radius-pill); margin-bottom:22px; }
  .divider { width:64px; height:8px; background:var(--rb-red); border-radius:var(--radius-sm); margin-bottom:22px; }
  .slide-cover .divider { margin:22px auto 0; }
  .headline, .cover-headline {
    font-family:var(--font-display); font-weight:var(--fw-black); text-transform:uppercase;
    color:var(--rb-white); line-height:var(--lh-tight); letter-spacing:var(--ls-display);
    text-shadow:0 4px 22px rgba(0,0,0,.5); }
  .headline { font-size:84px; margin-bottom:20px; }
  .cover-headline { font-size:104px; }
  .body-text { font-family:var(--font-body); font-weight:var(--fw-medium); font-size:32px;
               color:rgba(255,255,255,.94); line-height:1.45; text-shadow:0 2px 10px rgba(0,0,0,.5); }
  .body-text strong { color:var(--rb-red); font-weight:var(--fw-bold); }
  .cover-subline { font-family:var(--font-body); font-weight:var(--fw-semibold); font-size:30px;
                   color:var(--rb-white); margin-top:22px; }
  /* swipe pill on cover */
  .slide-cover .content::after { content:'SWIPE \2192'; position:absolute; left:50%; bottom:-150px;
    transform:translateX(-50%); font-family:var(--font-display); font-weight:var(--fw-bold); font-size:22px;
    letter-spacing:.06em; color:var(--rb-white); background:var(--rb-red); padding:16px 38px;
    border-radius:var(--radius-pill); }
</style></head>
<body class="{{slide_class}}">
  <img class="photo" src="{{photo_path}}" />
  <div class="shade"></div>
  <div class="tex"></div>
  <div class="brand"><img src="{{brand_dir}}/assets/logo-03.png" alt=""><span class="wordmark">Rockbusters</span></div>
  <div class="counter">{{slide_num}} / {{total_slides}}</div>
  {{content_block}}
</body></html>
