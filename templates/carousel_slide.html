<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rb-red: #e30613;
    --rb-red-deep: #b30410;
    --rb-ink: #121212;
    --rb-paper: #f5f4f2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: 'Montserrat', system-ui, sans-serif;
    background: var(--rb-ink);
    position: relative;
  }

  .photo {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center; display: block;
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.0) 26%,
      rgba(0,0,0,0.45) 62%, rgba(0,0,0,0.86) 100%);
  }
  .slide-cover .overlay { background: rgba(0,0,0,0.42); }

  /* ── Brand graphic language ───────────────────────────── */
  /* halftone dot field, bleeding from the top-right corner */
  .halftone {
    position: absolute; top: -40px; right: -40px; width: 460px; height: 460px;
    background-image: radial-gradient(var(--rb-red) 22%, transparent 23%);
    background-size: 26px 26px;
    -webkit-mask-image: radial-gradient(circle at top right, #000 0%, transparent 70%);
            mask-image: radial-gradient(circle at top right, #000 0%, transparent 70%);
    opacity: 0.55; pointer-events: none;
  }
  /* angular red shards */
  .shard {
    position: absolute; background: var(--rb-red); border-radius: 14px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.28);
  }
  .shard.s1 { width: 190px; height: 120px; top: 150px; left: -54px; transform: rotate(-18deg); }
  .shard.s2 { width: 70px; height: 70px; top: 300px; right: 80px; transform: rotate(20deg);
              background: var(--rb-red-deep); border-radius: 10px; }

  /* brand wordmark with roundel */
  .brand {
    position: absolute; top: 48px; left: 60px; display: flex; align-items: center; gap: 14px; z-index: 5;
  }
  .brand .mark {
    width: 48px; height: 48px; display: block;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35));
  }
  .brand .wordmark {
    font-family: 'Montserrat'; font-weight: 900; font-size: 26px; letter-spacing: 0.02em;
    color: #fff; text-transform: uppercase;
  }

  /* slide counter pill, top-right */
  .counter {
    position: absolute; top: 52px; right: 60px; z-index: 5;
    font-family: 'Montserrat'; font-weight: 700; font-size: 18px; letter-spacing: 0.06em;
    color: #fff; background: rgba(195,19,25,0.92);
    padding: 7px 16px; border-radius: 999px;
  }

  /* ── Content ──────────────────────────────────────────── */
  .content { position: absolute; bottom: 0; left: 0; right: 0; padding: 56px 64px 72px; z-index: 4; }
  .slide-cover .content { bottom: auto; top: 50%; transform: translateY(-50%); text-align: center; padding: 0 76px; }

  .slide-number {
    display: inline-block; font-family: 'Montserrat'; font-weight: 900; font-size: 20px;
    letter-spacing: 0.14em; text-transform: uppercase; color: #fff;
    background: var(--rb-red); padding: 6px 14px; border-radius: 6px; margin-bottom: 22px;
  }
  .divider { width: 70px; height: 8px; background: var(--rb-red); margin-bottom: 24px; border-radius: 4px; }
  .slide-cover .divider { margin: 24px auto 0; }

  .headline {
    font-family: 'Montserrat'; font-weight: 900; font-size: 80px; color: #fff;
    line-height: 0.96; letter-spacing: 0.005em; text-transform: uppercase;
    margin-bottom: 22px; text-shadow: 0 3px 18px rgba(0,0,0,0.45);
  }
  .body-text {
    font-family: 'Montserrat'; font-size: 33px; font-weight: 400; color: rgba(255,255,255,0.92);
    line-height: 1.5; letter-spacing: 0.005em; text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }
  .body-text strong { color: var(--rb-red); font-weight: 700; }

  /* cover variant */
  .cover-eyebrow {
    font-family: 'Montserrat'; font-weight: 900; font-size: 22px; letter-spacing: 0.18em;
    color: #fff; background: var(--rb-red); display: inline-block;
    padding: 8px 18px; border-radius: 6px; text-transform: uppercase; margin-bottom: 30px;
  }
  .cover-headline {
    font-family: 'Montserrat'; font-weight: 900; font-size: 104px; color: #fff;
    line-height: 0.92; letter-spacing: 0.01em; text-transform: uppercase;
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .cover-subline {
    font-family: 'Montserrat'; font-weight: 700; font-size: 30px; color: #fff;
    letter-spacing: 0.06em; text-transform: uppercase; margin-top: 26px;
  }
  /* swipe pill on the cover */
  .slide-cover .content::after {
    content: 'SWIPE \2192'; position: absolute; left: 50%; bottom: -150px; transform: translateX(-50%);
    font-family: 'Montserrat'; font-weight: 900; font-size: 24px; letter-spacing: 0.1em; color: #fff;
    background: var(--rb-red); padding: 16px 40px; border-radius: 999px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.35);
  }
</style>
</head>
