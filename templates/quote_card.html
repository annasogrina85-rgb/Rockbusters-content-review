<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="{{brand_dir}}/styles.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; position:relative; background:var(--rb-black);
         font-family:var(--font-body); }
  .photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; }
  .shade { position:absolute; inset:0; background:linear-gradient(to bottom,
            rgba(0,0,0,.35) 0%, rgba(0,0,0,.15) 30%, rgba(0,0,0,.55) 70%, rgba(0,0,0,.9) 100%); }
  .tex { position:absolute; inset:0; background:url("{{brand_dir}}/assets/pattern-white.png"); background-size:cover;
         opacity:.13; mix-blend-mode:screen; pointer-events:none; }
  .brand { position:absolute; top:44px; left:52px; display:flex; align-items:center; gap:13px; z-index:5; }
  .brand img { height:54px; }
  .brand .wordmark { font-family:var(--font-display); font-weight:var(--fw-black); font-size:25px;
                     text-transform:uppercase; color:var(--rb-white); }
  .content { position:absolute; left:56px; right:56px; bottom:60px; z-index:4; }
  .qmark { font-family:var(--font-display); font-weight:var(--fw-black); font-size:120px; line-height:.6;
           color:var(--rb-red); display:block; height:64px; }
  .quote { font-family:var(--font-display); font-weight:var(--fw-extrabold); text-transform:uppercase;
           font-size:60px; line-height:1.02; letter-spacing:var(--ls-display); color:var(--rb-white);
           text-shadow:0 3px 18px rgba(0,0,0,.55); margin-top:8px; }
  .attribution { margin-top:26px; font-family:var(--font-display); font-weight:var(--fw-bold);
                 text-transform:uppercase; letter-spacing:.06em; font-size:22px; color:var(--rb-white); }
  .attribution::before { content:''; display:inline-block; width:34px; height:4px; background:var(--rb-red);
                         vertical-align:middle; margin-right:14px; }
  .context { margin-top:8px; font-family:var(--font-body); font-weight:var(--fw-medium); font-size:19px;
             color:rgba(255,255,255,.8); letter-spacing:.02em; }
</style></head>
<body>
  <img class="photo" src="{{photo_path}}" />
  <div class="shade"></div>
  <div class="tex"></div>
  <div class="brand"><img src="{{brand_dir}}/assets/logo-03.png" alt=""><span class="wordmark">Rockbusters</span></div>
  <div class="content">
    <span class="qmark">&ldquo;</span>
    <div class="quote">{{quote_text}}</div>
    <div class="attribution">{{attribution}}</div>
    <div class="context">{{context}}</div>
  </div>
</body></html>
