<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #1a1a1a;
  }

  .photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.58);
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    text-align: center;
  }

  .quote-mark {
    font-size: 120px;
    font-weight: 900;
    color: rgba(255,255,255,0.18);
    line-height: 0.6;
    margin-bottom: 48px;
    font-family: Georgia, serif;
  }

  .quote-text {
    font-size: 58px;
    font-weight: 800;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    margin-bottom: 48px;
    max-width: 860px;
  }

  .divider {
    width: 56px;
    height: 3px;
    background: rgba(255,255,255,0.6);
    margin: 0 auto 32px;
  }

  .attribution {
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.72);
    text-transform: uppercase;
  }

  .context {
    margin-top: 14px;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
  }

  .brand {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <img class="photo" src="{{photo_path}}" />
  <div class="overlay"></div>

  <div class="content">
    <div class="quote-mark">"</div>
    <div class="quote-text">{{quote_text}}</div>
    <div class="divider"></div>
    <div class="attribution">{{attribution}}</div>
    {{#context}}<div class="context">{{context}}</div>{{/context}}
  </div>

  <div class="brand">Rockbusters</div>

</body>
</html>
