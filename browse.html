<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jany's Photo Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: Helvetica Neue, sans-serif; }

  .header { padding: 16px 20px 0; }
  h1 { font-size: 16px; font-weight: 600; color: #fff; }
  .subtitle { font-size: 12px; color: #666; margin-top: 3px; }

  .tabs {
    display: flex; gap: 6px; padding: 12px 20px 0;
    overflow-x: auto; scrollbar-width: none; flex-wrap: wrap;
  }
  .tab {
    background: #222; color: #999; border: none; padding: 6px 12px;
    border-radius: 20px; cursor: pointer; font-size: 12px; white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { background: #333; color: #ddd; }
  .tab.active { background: #f90; color: #000; font-weight: 600; }

  .toolbar {
    position: sticky; top: 0; background: #111; padding: 10px 20px;
    border-bottom: 1px solid #1e1e1e; z-index: 10;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-top: 12px;
  }
  button {
    background: #2a2a2a; color: #eee; border: none; padding: 7px 14px;
    border-radius: 5px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: #333; }
  button.primary { background: #f90; color: #000; font-weight: 600; }
  #count { font-size: 13px; color: #888; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px; padding: 16px 20px;
  }
  .card {
    position: relative; cursor: pointer; border-radius: 6px; overflow: hidden;
    border: 2px solid transparent; transition: border-color 0.12s;
  }
  .card:hover { border-color: #444; }
  .card.selected { border-color: #f90; }
  .card img { width: 100%; display: block; aspect-ratio: 3/2; object-fit: cover; background: #1a1a1a; }
  .card .label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    font-size: 10px; padding: 16px 6px 5px; color: #aaa;
    display: flex; justify-content: space-between;
  }
  .card .label .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 85%; }
  .card .check { color: #f90; font-weight: bold; display: none; flex-shrink: 0; }
  .card.selected .check { display: inline; }

  #output {
    background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 14px 20px; font-family: monospace; font-size: 12px; color: #7cf;
    white-space: pre-wrap; margin: 0 20px 20px; display: none; line-height: 1.6;
  }
  .folder-label {
    font-size: 11px; color: #555; padding: 4px 20px 8px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
</style>

const tabOrder = ["2026_may_klemen","siurana","ceuse_2024","margalef_2024","selection","sella_2024_fall","rodellar_2025","margalef_siurana","albarracin","gorges_du_tarn_2024"];
const tabLabels = {"2026_may_klemen":"May 2026 Klemen","siurana":"Siurana","ceuse_2024":"Ceuse 2024","margalef_2024":"Margalef 2024","selection":"Frankenjura / Zillertal","sella_2024_fall":"Sella 2024","rodellar_2025":"Rodellar 2025","margalef_siurana":"Margalef + Siurana","albarracin":"Albarracin 2019","gorges_du_tarn_2024":"Gorges du Tarn"};

const selected = new Set();
let currentFolder = tabOrder[0];

// Build tabs
const tabsEl = document.getElementById('tabs');
tabOrder.forEach(folder => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (folder === currentFolder ? ' active' : '');
  btn.textContent = `${tabLabels[folder]} (${index[folder]?.length || 0})`;
  btn.onclick = () => switchFolder(folder);
  btn.dataset.folder = folder;
  tabsEl.appendChild(btn);
});

function switchFolder(folder) {
  currentFolder = folder;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.folder === folder));
  renderGrid(folder);
  document.getElementById('output').style.display = 'none';
  window.scrollTo(0, 0);
}

function renderGrid(folder) {
  const files = index[folder] || [];
  document.getElementById('folder-label').textContent = `${tabLabels[folder]} — ${files.length} photos`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  files.forEach(f => {
    const path = `photos/jany/${folder}/${f}`;
    const card = document.createElement('div');
    card.className = 'card' + (selected.has(path) ? ' selected' : '');
    card.innerHTML = `
      <img src="${path}" loading="lazy" alt="${f}">
      <div class="label">
        <span class="name">${f.replace(/\.(JPG|jpg)$/i,'')}</span>
        <span class="check">✓</span>
      </div>`;
    card.addEventListener('click', () => {
      if (selected.has(path)) { selected.delete(path); card.classList.remove('selected'); }
      else { selected.add(path); card.classList.add('selected'); }
      document.getElementById('count').textContent = `${selected.size} selected`;
    });
    grid.appendChild(card);
  });
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  document.getElementById('count').textContent = '0 selected';
  document.getElementById('output').style.display = 'none';
}

function showSelected() {
  if (!selected.size) return;
  const paths = [...selected].sort().map(p => `"${p}"`).join('\n');
  const out = document.getElementById('output');
  out.textContent = paths;
  out.style.display = 'block';
  out.scrollIntoView({ behavior: 'smooth' });
}

renderGrid(currentFolder);
</script>
