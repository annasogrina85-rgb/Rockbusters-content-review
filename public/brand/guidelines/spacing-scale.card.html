<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base unit" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); color:var(--text-primary); }
  .wrap { padding:20px 28px; display:flex; flex-direction:column; gap:8px; }
  .line { display:flex; align-items:center; gap:14px; }
  .tok { font-size:11px; color:var(--text-muted); width:150px; }
  .bar { height:14px; background:var(--rb-red); border-radius:2px; }
</style></head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">--space-1 · 4</span><div class="bar" style="width:4px;"></div></div>
    <div class="line"><span class="tok">--space-2 · 8</span><div class="bar" style="width:8px;"></div></div>
    <div class="line"><span class="tok">--space-3 · 12</span><div class="bar" style="width:12px;"></div></div>
    <div class="line"><span class="tok">--space-4 · 16</span><div class="bar" style="width:16px;"></div></div>
    <div class="line"><span class="tok">--space-5 · 24</span><div class="bar" style="width:24px;"></div></div>
    <div class="line"><span class="tok">--space-6 · 32</span><div class="bar" style="width:32px;"></div></div>
    <div class="line"><span class="tok">--space-7 · 48</span><div class="bar" style="width:48px;"></div></div>
    <div class="line"><span class="tok">--space-8 · 64</span><div class="bar" style="width:64px;"></div></div>
    <div class="line"><span class="tok">--space-9 · 96</span><div class="bar" style="width:96px;"></div></div>
  </div>
</body></html>
