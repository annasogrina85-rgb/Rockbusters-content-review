<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); }
  .row { display:flex; align-items:center; gap:36px; padding:26px 30px; }
  .row img.lock { height:96px; }
  .row img.mark { height:96px; }
  .div { width:1px; align-self:stretch; background:var(--border-default); }
  .meta { font-size:12px; color:var(--text-secondary); line-height:1.5; }
  .meta b { font-family:var(--font-display); text-transform:uppercase; letter-spacing:0.04em; font-size:12px; color:var(--text-primary); }
</style></head>
<body>
  <div class="row">
    <img class="lock" src="../assets/logo-02.png" alt="Rockbusters logo" />
    <div class="div"></div>
    <img class="mark" src="../assets/logo-03.png" alt="Rockbusters mark" />
    <div class="div"></div>
    <div class="meta"><b>Lockup</b> — headers, footers.<br/><b>Mark</b> — favicon, avatar, loading.<br/>Min clear space = height of the "O".</div>
  </div>
</body></html>
