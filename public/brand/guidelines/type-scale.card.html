<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Display → body → micro" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); color:var(--text-primary); }
  .wrap { padding:20px 28px; display:flex; flex-direction:column; gap:10px; }
  .line { display:flex; align-items:baseline; gap:16px; }
  .tok { font-size:10px; color:var(--text-muted); width:120px; flex-shrink:0; font-family:var(--font-body); }
  .d { font-family:var(--font-display); font-weight:800; text-transform:uppercase; letter-spacing:-0.01em; }
</style></head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">--fs-h1 · 40</span><span class="d" style="font-size:40px;">Send it</span></div>
    <div class="line"><span class="tok">--fs-h2 · 32</span><span class="d" style="font-size:32px;">The lineup</span></div>
    <div class="line"><span class="tok">--fs-h3 · 24</span><span class="d" style="font-size:24px;">Coaching clinics</span></div>
    <div class="line"><span class="tok">--fs-lead · 20</span><span style="font-size:20px; font-weight:500;">Crush your goals.</span></div>
    <div class="line"><span class="tok">--fs-body · 16</span><span style="font-size:16px;">Run by climbers, for climbers.</span></div>
    <div class="line"><span class="tok">--fs-small · 14</span><span style="font-size:14px; color:var(--text-secondary);">From dawn till dusk.</span></div>
  </div>
</body></html>
