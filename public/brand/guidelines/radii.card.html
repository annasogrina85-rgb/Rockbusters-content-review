<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); color:var(--text-primary); }
  .row { display:flex; gap:26px; padding:24px 28px; align-items:flex-end; }
  .cell { text-align:center; }
  .box { width:110px; height:64px; background:var(--rb-grey-100); border:2px solid var(--rb-ink); }
  .tok { font-size:11px; color:var(--text-secondary); margin-top:8px; }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:var(--radius-none);"></div><div class="tok">square · 0</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-slight);"></div><div class="tok">slight · 6px</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-pill); width:150px;"></div><div class="tok">pill · buttons &amp; tags</div></div>
  </div>
</body></html>
