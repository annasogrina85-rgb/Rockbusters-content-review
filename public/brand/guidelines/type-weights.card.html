<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); color:var(--text-primary); }
  .wrap { padding:22px 28px; display:flex; flex-direction:column; gap:6px; }
  .line { display:flex; align-items:baseline; gap:16px; }
  .tok { font-size:10px; color:var(--text-muted); width:130px; }
  .w { font-size:26px; }
</style></head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">400 Regular</span><span class="w" style="font-weight:400;">Tie in.</span></div>
    <div class="line"><span class="tok">500 Medium</span><span class="w" style="font-weight:500;">Tie in.</span></div>
    <div class="line"><span class="tok">600 Semibold</span><span class="w" style="font-weight:600;">Tie in.</span></div>
    <div class="line"><span class="tok">700 Bold</span><span class="w" style="font-weight:700;">Tie in.</span></div>
    <div class="line"><span class="tok">800 Extrabold</span><span class="w" style="font-weight:800;">Tie in.</span></div>
    <div class="line"><span class="tok">900 Black</span><span class="w" style="font-weight:900;">Tie in.</span></div>
  </div>
</body></html>
