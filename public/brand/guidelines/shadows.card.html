<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Neutral, restrained depth + red focus ring" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-subtle); color:var(--text-primary); }
  .row { display:flex; gap:28px; padding:34px 30px; align-items:center; }
  .cell { text-align:center; }
  .box { width:96px; height:64px; background:#fff; border-radius:var(--radius-md); }
  .tok { font-size:11px; color:var(--text-secondary); margin-top:14px; }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm);"></div><div class="tok">sm</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-md);"></div><div class="tok">md</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-lg);"></div><div class="tok">lg</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-focus);"></div><div class="tok">focus (red ring)</div></div>
  </div>
</body></html>
