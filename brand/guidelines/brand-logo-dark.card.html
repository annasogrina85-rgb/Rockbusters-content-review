<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); }
  .panel { position:relative; overflow:hidden; background:var(--rb-black); padding:34px 36px; min-height:220px; box-sizing:border-box; display:flex; align-items:center; gap:40px; }
  .panel::before { content:""; position:absolute; inset:0; background:url("../assets/pattern-white.png"); background-size:cover; opacity:0.12; pointer-events:none; }
  .panel img { height:88px; position:relative; z-index:1; }
  .note { color:rgba(255,255,255,0.85); font-size:12px; max-width:200px; line-height:1.5; position:relative; z-index:1; }
</style></head>
<body>
  <div class="panel">
    <img src="../assets/logo-03.png" alt="mark" />
    <img src="../assets/logo-mark-white.png" alt="one-colour white mark" />
    <img src="../assets/climb-hard-sleep.png" alt="Climb. Hard. Eat. Sleep. Climb. Again." style="height:96px;" />
    <div class="note">On black, use the mark over a low-opacity texture. When red doesn't stand out from the photo, switch to the one-colour mark — all-white (or all-black on light).</div>
  </div>
</body></html>
