<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Tight & sharp; pills for actions" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); color:var(--text-primary); }
  .row { display:flex; gap:22px; padding:24px 28px; align-items:flex-end; }
  .cell { text-align:center; }
  .box { width:84px; height:64px; background:var(--rb-grey-100); border:2px solid var(--rb-ink); }
  .tok { font-size:11px; color:var(--text-secondary); margin-top:8px; }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:var(--radius-none);"></div><div class="tok">none · 0</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-sm);"></div><div class="tok">sm · 3</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-md);"></div><div class="tok">md · 6</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-lg);"></div><div class="tok">lg · 12</div></div>
    <div class="cell"><div class="box" style="border-radius:var(--radius-pill); width:120px;"></div><div class="tok">pill · 999</div></div>
  </div>
</body></html>
