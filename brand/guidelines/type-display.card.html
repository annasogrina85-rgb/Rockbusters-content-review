<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); color:var(--text-primary); }
  .wrap { padding:24px 28px; }
  .disp { font-family:var(--font-display); font-weight:900; text-transform:uppercase; line-height:0.92; letter-spacing:-0.02em; font-size:54px; }
  .disp .red { color:inherit; }
  .meta { margin-top:16px; font-size:12px; color:var(--text-secondary); }
</style></head>
<body>
  <div class="wrap">
    <div class="disp">Climb<br/>Better<span class="red">,</span> Harder<br/><span class="red">&amp; More.</span></div>
    <div class="meta">Montserrat · 900 · UPPERCASE · line-height 0.92 · tracking −0.02em · --fs-display-2</div>
  </div>
</body></html>
