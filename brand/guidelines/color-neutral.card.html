<!-- @dsCard group="Colors" viewport="700x130" name="Neutral scale" subtitle="Granite-grey ramp, chalk to charcoal" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); }
  .row { display:flex; padding:20px; }
  .cell { flex:1; text-align:center; }
  .chip { height:64px; }
  .name { font-size:10px; color:var(--text-secondary); margin-top:6px; }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="chip" style="background:var(--rb-grey-50); border:1px solid var(--border-default);"></div><div class="name">50</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-100);"></div><div class="name">100</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-200);"></div><div class="name">200</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-300);"></div><div class="name">300</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-400);"></div><div class="name">400</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-500);"></div><div class="name">500</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-600);"></div><div class="name">600</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-700);"></div><div class="name">700</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-800);"></div><div class="name">800</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-900);"></div><div class="name">900</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-grey-950);"></div><div class="name">950</div></div>
  </div>
</body></html>
