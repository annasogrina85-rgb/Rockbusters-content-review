<!-- @dsCard group="Colors" viewport="700x130" name="Red scale" subtitle="Hover, press & deep-red accents" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); }
  .row { display:flex; padding:20px; gap:0; }
  .cell { flex:1; }
  .chip { height:64px; }
  .name { font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:0.06em; font-size:11px; margin-top:8px; }
  .hex { font-size:11px; color:var(--text-secondary); }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="chip" style="background:var(--rb-red-bright);"></div><div class="name">Bright</div><div class="hex">#FF1A26</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-red);"></div><div class="name">Red</div><div class="hex">#E30613</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-red-dark);"></div><div class="name">Dark</div><div class="hex">#B30410</div></div>
    <div class="cell"><div class="chip" style="background:var(--rb-red-darker);"></div><div class="name">Darker</div><div class="hex">#7D0309</div></div>
  </div>
</body></html>
