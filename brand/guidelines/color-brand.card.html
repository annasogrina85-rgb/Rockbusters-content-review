<!-- @dsCard group="Colors" viewport="700x190" name="Brand core" subtitle="Signal red, hard black, clean white, creamy white" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:var(--surface-page); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:20px; }
  .sw { border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-default); }
  .chip { height:90px; display:flex; align-items:flex-end; padding:10px; }
  .meta { padding:10px 12px; }
  .name { font-family:var(--font-display); font-weight:800; text-transform:uppercase; letter-spacing:0.04em; font-size:13px; }
  .hex { font-size:12px; color:var(--text-secondary); margin-top:2px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--rb-red);"></div><div class="meta"><div class="name">Signal Red</div><div class="hex">--rb-red · #E30613</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rb-black);"></div><div class="meta"><div class="name">Hard Black</div><div class="hex">--rb-black · #000000</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rb-white);"></div><div class="meta"><div class="name">Clean White</div><div class="hex">--rb-white · #FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rb-cream);"></div><div class="meta"><div class="name">Creamy White</div><div class="hex">--rb-cream · provisional</div></div></div>
  </div>
</body></html>
