<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rockbusters — Climb better, harder &amp; more</title>
<link rel="icon" href="../../assets/logo-03.png" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-body); color: var(--text-primary); background: var(--rb-black); }
  * { box-sizing: border-box; }
  a { color: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="util.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Lineup.jsx"></script>
<script type="text/babel" src="Coaches.jsx"></script>
<script type="text/babel" src="EnquiryModal.jsx"></script>
<script type="text/babel">
  const { Header, Hero, StatsBand, Cover, Philosophy, Lineup, Coaches, Footer, EnquiryModal } = window;

  function App() {
    const [view, setView] = React.useState("home");
    const [modal, setModal] = React.useState({ open: false, trip: null });
    const openEnquiry = (trip) => setModal({ open: true, trip: trip && trip.id ? trip : null });
    const closeEnquiry = () => setModal((m) => ({ ...m, open: false }));
    const nav = (v) => { setView(v); const s = document.getElementById("rb-scroll"); if (s) s.scrollTop = 0; };

    return (
      <div id="rb-scroll" style={{ height: "100vh", overflowY: "auto", background: "var(--surface-page)" }}>
        <Header onNav={nav} active={view} onEnquire={() => openEnquiry()} />
        {view === "home" && (
          <main>
            <Hero onEnquire={() => openEnquiry()} onNav={nav} />
            <StatsBand />
            <Cover />
            <Lineup onEnquire={openEnquiry} />
            <Coaches />
            <Philosophy onEnquire={() => openEnquiry()} />
          </main>
        )}
        {view === "trips" && (
          <main>
            <Lineup onEnquire={openEnquiry} />
          </main>
        )}
        {view === "coaches" && (
          <main>
            <Coaches />
            <Philosophy onEnquire={() => openEnquiry()} />
          </main>
        )}
        <Footer onEnquire={() => openEnquiry()} />
        <EnquiryModal open={modal.open} trip={modal.trip} onClose={closeEnquiry} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
